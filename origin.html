<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Origins - GLOBCART</title>
  <link rel="stylesheet" href="/src/retail.css" />
</head>
<body>
  <header id="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-logo"><a href="/"><span class="logo-text">GLOBCART</span></a></div>
        <div class="header-actions">
           <a href="/cart.html" class="btn-cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="cart-badge" id="cart-count">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 60px 0;">
    <h1 class="section-title">Warehouse Origins</h1>
    <p style="color:var(--text-muted); margin-bottom:40px;">Explore items by the country they ship from.</p>
    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap:20px;">
        <div class="product-card" style="text-align:center; padding:32px;">
            <span style="font-size:32px;">🇯🇵</span>
            <h3 style="margin-top:12px;">Japan</h3>
        </div>
        <div class="product-card" style="text-align:center; padding:32px;">
            <span style="font-size:32px;">🇮🇳</span>
            <h3 style="margin-top:12px;">India</h3>
        </div>
        <div class="product-card" style="text-align:center; padding:32px;">
            <span style="font-size:32px;">🇲🇦</span>
            <h3 style="margin-top:12px;">Morocco</h3>
        </div>
        <div class="product-card" style="text-align:center; padding:32px;">
            <span style="font-size:32px;">🇵🇪</span>
            <h3 style="margin-top:12px;">Peru</h3>
        </div>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
