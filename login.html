<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - GLOBCART</title>
  <link rel="stylesheet" href="/src/retail.css" />
</head>
<body>
  <header id="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-logo"><a href="/"><span class="logo-text">GLOBCART</span></a></div>
      </div>
    </div>
  </header>

  <main class="container auth-page-v2">
    <div class="auth-card-v2">
      <div style="width:56px; height:56px; background:var(--bg-secondary); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </div>
      <h2 class="section-title text-center" style="font-size:24px; margin-bottom:8px;">Welcome Back</h2>
      <p class="text-center" style="color:var(--text-muted); font-size:14px; margin-bottom:32px;">Please sign in to access your global orders.</p>

      <form class="auth-form-v2" id="login-form">
        <p id="auth-message" style="color:#ef4444; font-size:12px; margin-bottom:8px;"></p>
        <div class="auth-input-wrap">
          <input id="email-input" class="auth-input-v2" type="email" placeholder="Email Address" required style="padding-left:16px;">
        </div>
        <div class="auth-input-wrap">
          <input id="password-input" class="auth-input-v2" type="password" placeholder="Password" required style="padding-left:16px;">
        </div>
        <button id="email-signin-btn" class="btn-primary-v2 w-full" style="margin-top:16px;">Sign In</button>
      </form>

      <div class="auth-divider-v2">
        <div class="line"></div>
        <span>Or continue with</span>
        <div class="line"></div>
      </div>

      <button id="google-login-btn" class="social-btn-v2" style="width:100%;">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" style="width:20px; margin-right:8px;"> Google Account
      </button>

      <p class="text-center" style="margin-top:24px; font-size:13px;">Don't have an account? <a href="/signup.html" style="color:var(--accent); font-weight:700;">Sign Up</a></p>
    </div>
  </main>

  <script type="module" src="/src/auth.ts"></script>
</body>
</html>
