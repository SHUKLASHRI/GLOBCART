<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details - GLOBCART</title>
  <link rel="stylesheet" href="/src/retail.css" />
</head>
<body style="background:var(--bg-gradient); min-height:100vh;">
  <header id="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-logo"><a href="/"><span class="logo-text">GLOBCART</span></a></div>
        <div class="header-actions">
           <a href="/cart.html" class="btn-cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="cart-badge" id="cart-count">0</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 100px 0;">
    <div id="product-detail-container" style="display:grid; grid-template-columns: 1fr; gap:80px;">
        <!-- Loading -->
        <div style="aspect-ratio:1; background:white; border-radius:var(--radius-xl); box-shadow:var(--shadow-xl);"></div>
    </div>
  </main>

  <style>
    @media (min-width: 1024px) {
      #product-detail-container { grid-template-columns: 1.2fr 1fr; align-items: start; }
    }
  </style>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
