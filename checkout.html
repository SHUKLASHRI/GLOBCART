<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - GLOBCART</title>
  <link rel="stylesheet" href="/src/retail.css" />
</head>
<body>
  <header id="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-logo"><a href="/"><span class="logo-text">GLOBCART</span></a></div>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 60px 0; display:flex; justify-content:center;">
    <div class="auth-card-v2" style="max-width: 600px;">
      <h2 class="section-title" style="margin-bottom: 24px;">Secure Checkout</h2>
      <form id="checkout-form" class="auth-form-v2" style="text-align: left;">
        <div class="auth-input-wrap">
          <label style="font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:4px; display:block;">Full Shipping Address</label>
          <input type="text" class="auth-input-v2" placeholder="123 Artisan Lane, World City" required style="padding-left:16px;">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
            <div class="auth-input-wrap">
              <label style="font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:4px; display:block;">City</label>
              <input type="text" class="auth-input-v2" placeholder="London" required style="padding-left:16px;">
            </div>
            <div class="auth-input-wrap">
              <label style="font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:4px; display:block;">Postal Code</label>
              <input type="text" class="auth-input-v2" placeholder="SW1A 1AA" required style="padding-left:16px;">
            </div>
        </div>
        
        <div style="background:var(--accent-soft); padding:16px; border-radius:12px; margin:20px 0; border:1px solid var(--accent);">
            <p style="font-size:14px; font-weight:600; color:var(--accent-dark);">Payment Method: International Secure Pay (Simulated)</p>
            <p style="font-size:12px; color:var(--accent-dark);">All global transactions are encrypted and insured.</p>
        </div>

        <button type="submit" class="btn-primary-v2 w-full">Pay and Complete Order</button>
      </form>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
