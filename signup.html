<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - GLOBCART</title>
  <link rel="stylesheet" href="/src/retail.css" />
</head>
<body>
  <header id="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-logo"><a href="/"><span class="logo-text">GLOBCART</span></a></div>
      </div>
    </div>
  </header>

  <main class="container auth-page-v2">
    <div class="auth-card-v2">
      <h2 class="section-title text-center" style="font-size:24px; margin-bottom:8px;">Start Shopping</h2>
      <p class="text-center" style="color:var(--text-muted); font-size:14px; margin-bottom:32px;">Create an account to track global finds.</p>

      <form class="auth-form-v2" id="signup-form">
        <p id="auth-message" style="color:#ef4444; font-size:12px; margin-bottom:8px;"></p>
        <div class="auth-input-wrap">
          <input id="email-input" class="auth-input-v2" type="email" placeholder="Email Address" required style="padding-left:16px;">
        </div>
        <div class="auth-input-wrap">
          <input id="password-input" class="auth-input-v2" type="password" placeholder="Password" required style="padding-left:16px;">
        </div>
        <button id="email-signup-btn" class="btn-primary-v2 w-full" style="margin-top:16px;">Create Account</button>
      </form>

      <div class="auth-divider-v2">
        <div class="line"></div>
        <span>Or join with</span>
        <div class="line"></div>
      </div>

      <button id="google-login-btn" class="social-btn-v2" style="width:100%;">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" style="width:20px; margin-right:8px;"> Google Account
      </button>

      <p class="text-center" style="margin-top:24px; font-size:13px;">Member? <a href="/login.html" style="color:var(--accent); font-weight:700;">Sign In</a></p>
    </div>
  </main>

  <script type="module" src="/src/auth.ts"></script>
</body>
</html>
