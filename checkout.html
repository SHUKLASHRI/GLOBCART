<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Your Order - GLOBCART</title>
  <link rel="stylesheet" href="/src/retail.css" />
</head>
<body style="background: #f8fafc;">
  <main class="container" style="padding: 100px 0; display:flex; justify-content:center;">
    <div class="auth-card-v2" style="max-width: 700px; padding: 60px;">
      <h2 class="hero-title" style="font-size:36px; margin-bottom:12px; text-align:left;">Checkout</h2>
      <p style="color:var(--text-muted); margin-bottom:40px;">Finalize your global collection shipment details.</p>
      
      <form id="checkout-form" class="auth-form-v2" style="display:flex; flex-direction:column; gap:24px;">
        <div class="auth-input-wrap">
          <label style="font-size:12px; font-weight:800; color:#334155; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:block;">Full Street Address</label>
          <input type="text" class="auth-input-v2" placeholder="Street, Apt, Unit" required>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
            <div class="auth-input-wrap">
              <label style="font-size:12px; font-weight:800; color:#334155; text-transform:uppercase; margin-bottom:8px; display:block;">City</label>
              <input type="text" class="auth-input-v2" placeholder="World City" required>
            </div>
            <div class="auth-input-wrap">
              <label style="font-size:12px; font-weight:800; color:#334155; text-transform:uppercase; margin-bottom:8px; display:block;">Postal Code</label>
              <input type="text" class="auth-input-v2" placeholder="00000" required>
            </div>
        </div>
        
        <div style="background:var(--accent-soft); padding:24px; border-radius:var(--radius-md); border:1px solid #bae6fd; display:flex; align-items:center; gap:16px;">
            <div style="background:white; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            </div>
            <div>
                <p style="font-weight:700; color:#0369a1; font-size:15px;">Secure Global Payment Enabled</p>
                <p style="font-size:13px; color:#0369a1; opacity:0.8;">Verified international transaction gateway.</p>
            </div>
        </div>

        <button type="submit" class="btn-primary-v2 w-full" style="padding:20px;">Complete Order and Pay</button>
      </form>
    </div>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
