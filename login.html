<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — GlobCart</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" /><link rel="stylesheet" href="/src/styles.css" /><link rel="stylesheet" href="/src/retail.css" />
  <style>
    .page-container { padding: 120px 5%; min-height: 70vh; max-width: 800px; margin: 0 auto; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; margin-bottom: 1rem; }
    .form-box { background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-top: 2rem; }
    input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; background: transparent; border: 1px solid rgba(0,0,0,0.2); }
  </style>
</head>
<body>
    <header id="site-header">
    <div class="header-inner">
      <div class="header-logo">
        <a href="/" style="text-decoration:none;"><span class="logo-text">GlobCart</span></a>
      </div>
      <div class="search-container">
        <select class="search-select"><option>All</option></select>
        <input type="text" class="search-input" placeholder="Search the absolute cheapest global finds...">
        <button class="search-btn-mega">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </div>
      <div class="header-actions">
        <a href="/login.html" style="color:white; font-size: 13px; text-decoration:none; margin-right:10px;">Hello, sign in<br/><b>Accounts & Lists</b></a>
        <button class="btn-cart" id="cart-btn" aria-label="Cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-badge">0</span>
        </button>
      </div>
    </div>
    <div class="mega-menu">
      <a href="#" class="mega-link all-menu">= All</a>
      <a href="/curated.html" class="mega-link">Today's Deals</a>
      <a href="/about.html" class="mega-link">Customer Service</a>
      <a href="/origin.html" class="mega-link">Registry</a>
      <a href="#" class="mega-link">Gift Cards</a>
      <a href="#" class="mega-link">Sell</a>
    </div>
  </header>
  <main class="page-container">
    <h1 class="page-title">Login to GlobCart</h1><div class="form-box"><input type="email" placeholder="Email Address"/><input type="password" placeholder="Password"/><button class="btn-primary" style="width:100%; margin-bottom:10px;">Sign In</button><div style="text-align:center; margin-bottom:10px;">or</div><button id="google-login-btn" type="button" class="btn-primary" style="background:#ffffff !important; color:#333 !important; border:1px solid #ccc !important; width:100%; display:flex; justify-content:center; align-items:center;"><img src="https://www.svgrepo.com/show/475656/google-color.svg" style="width:16px; margin-right:8px;"/> Sign in with Google</button></div>
  </main>

</html>
